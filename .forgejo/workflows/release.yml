# Android release: build a signed AAB and publish it to the Play Store.
#
# Runs on a self-hosted Forgejo Actions runner (act_runner + Docker). The job
# executes inside the cirruslabs/flutter image, which already bundles Flutter,
# the Android SDK, JDK 17, and pre-accepted SDK licenses - so the runner host
# only needs Docker.
#
# Required repo/org secrets (Settings -> Actions -> Secrets):
#   ANDROID_KEYSTORE_BASE64    base64 of your upload keystore (vsh-upload.jks)
#   ANDROID_KEYSTORE_PASSWORD  store password
#   ANDROID_KEY_ALIAS          key alias (e.g. upload)
#   ANDROID_KEY_PASSWORD       key password
#   PLAY_SERVICE_ACCOUNT_JSON  Google Play service-account JSON (whole file)
#
# Publishing (the last step) needs the Gradle Play Publisher plugin wired into
# android/app/build.gradle.kts - see docs/ci-cd-android.md. Until that is added
# the build/sign steps still work; only the publish step needs it.

name: Android release

on:
  push:
    tags:
      - 'v*' # push a tag like v1.1.3 to cut a release
  workflow_dispatch: {} # or trigger manually from the Actions tab

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:3.44.1
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git rev-list --count` yields the real, monotonic
          # commit count used as the Android versionCode.
          fetch-depth: 0

      - name: Trust the workspace
        # The container runs as a different user than the checkout owner; without
        # this git refuses to operate ("dubious ownership").
        run: git config --global --add safe.directory '*'

      - name: Restore upload keystore and key.properties
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload.jks
          cat > android/key.properties <<EOF
          storeFile=upload.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Set versionCode from commit count
        run: |
          BUILD=$(git rev-list --count HEAD)
          sed -i -E "s/^(version: [0-9]+\.[0-9]+\.[0-9]+)\+[0-9]+/\1+${BUILD}/" pubspec.yaml
          echo "versionCode -> ${BUILD}"

      - name: Install dependencies
        run: flutter pub get

      - name: Codegen (Drift / Riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build and publish to Play (internal track)
        env:
          # Gradle Play Publisher reads the service-account JSON from this env var.
          ANDROID_PUBLISHER_CREDENTIALS: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          cd android
          ./gradlew :app:publishReleaseBundle --no-daemon
